<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
    .header { background-color: #5ce778; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
    .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 80%; padding: 10px 15px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
    .user-msg { background-color: #5ce783; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
    .bot-msg { background-color: #e4e6eb; color: black; align-self: flex-start; border-bottom-left-radius: 0; }
    .input-area { display: flex; padding: 10px; border-top: 1px solid #ccc; background: white; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
    button { background-color: #e0afdb; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 20px; cursor: pointer; }
    button:hover { background-color: #91d3f5; }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="header">พี่อุ่นใจ</div>
    <div class="chat-box" id="chatBox">
      <div class="message bot-msg">สวัสดีค่ะ/ครับ มีเรื่องไม่สบายใจอะไรเกี่ยวกับการใช้อินเทอร์เน็ต เล่าให้เราฟังได้เลยนะ พื้นที่นี้ปลอดภัยและรับฟังเสมอค่ะ/ครับ 😊</div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()" id="sendBtn">ส่ง</button>
    </div>
  </div>

<script>
    // 🔴 นำ URL ของเว็บแอป (Web App URL) ที่ได้จาก Apps Script มาใส่ตรงนี้
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzO50W50m0Yb9hXewUWULWy2hnxCU20AI1X_Gzx80BBFZld5peXwPwjkYcKZxgOHRmS/exec";

    function sendMessage() {
      const inputField = document.getElementById("userInput");
      const message = inputField.value.trim();
      if (message === "") return;

      appendMessage(message, "user-msg");
      inputField.value = "";
      
      const btn = document.getElementById("sendBtn");
      btn.innerText = "กำลังคิด...";
      btn.disabled = true;

      // ใช้ Fetch API เพื่อส่งข้อมูลไปหา Web App URL ที่อยู่บน App Script
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          // ใช้ text/plain เพื่อป้องกันปัญหา CORS Preflight เวลาเรียกข้าม Domain
          'Content-Type': 'text/plain;charset=utf-8' 
        },
        body: JSON.stringify({ message: message })
      })
      .then(response => response.json())
      .then(data => {
        appendMessage(data.reply, "bot-msg");
        btn.innerText = "ส่ง";
        btn.disabled = false;
      })
      .catch(error => {
        appendMessage("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่", "bot-msg");
        btn.innerText = "ส่ง";
        btn.disabled = false;
        console.error("Error:", error);
      });
    }

    function appendMessage(text, className) {
      const chatBox = document.getElementById("chatBox");
      const msgDiv = document.createElement("div");
      msgDiv.className = "message " + className;
      msgDiv.innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }
</script>
</body>
</html>
